<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon — Abe's Motorsports</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a0a0a;
      color: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .label {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
      color: #e8e8e8;
      margin-bottom: 1.25rem;
    }

    p {
      font-size: 1.1rem;
      font-weight: 300;
      color: #888;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">Abe's Motorsports</div>
    <h1>Coming Soon</h1>
    <p>Something great is on the way.</p>
  </div>
</body>
</html>
